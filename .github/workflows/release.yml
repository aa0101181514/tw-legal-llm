name: Release to PyPI

# Publishes to PyPI when you push a version tag (e.g. v0.1.0).
# Uses PyPI Trusted Publishing (OIDC) — no API token stored as a secret.
# One-time setup on PyPI: project Settings → Publishing → add a trusted publisher
#   owner=aa0101181514  repo=tw-legal-rag  workflow=release.yml  environment=pypi

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
